<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: Rich Dark Emerald-Slate (#1E2F31) with rounded corners/squircle for app icon look -->
  <rect width="512" height="512" rx="128" fill="#1E2F31" />
  
  <!-- Outer Ring: Warm Gold (#E6D3AF) for financial structure -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#E6D3AF" stroke-width="12" stroke-linecap="round" />
  
  <!-- Subtle inner financial grid/concentric lines -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#E6D3AF" stroke-width="2" stroke-dasharray="10, 15" opacity="0.4" />
  
  <!-- Medical/Clinical Cross in Deep Forest Clinical Teal (#1C6048) and Gold accents -->
  <g transform="translate(256, 256)">
    <!-- Main Clinical Cross Structure -->
    <!-- Vertical Bar -->
    <rect x="-40" y="-110" width="80" height="220" rx="16" fill="#1C6048" stroke="#E6D3AF" stroke-width="4" />
    <!-- Horizontal Bar -->
    <rect x="-110" y="-40" width="220" height="80" rx="16" fill="#1C6048" stroke="#E6D3AF" stroke-width="4" />
    
    <!-- Central golden glowing seed/rhombus representing capital/growth -->
    <path d="M 0,-25 L 25,0 L 0,25 L -25,0 Z" fill="#E6D3AF" opacity="0.95" />
    
    <!-- Four delicate golden stars/ticks in corner quadrants representing multi-entities (OpCo, PropCo, HoldCo, Consolidated) -->
    <circle cx="-65" cy="-65" r="8" fill="#E6D3AF" />
    <circle cx="65" cy="-65" r="8" fill="#E6D3AF" />
    <circle cx="-65" cy="65" r="8" fill="#E6D3AF" />
    <circle cx="65" cy="65" r="8" fill="#E6D3AF" />
  </g>
</svg>
